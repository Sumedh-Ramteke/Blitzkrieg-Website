services:
  - type: web
    name: blitzkrieg-backend
    env: node
    rootDir: blitzkrieg-backend
    buildCommand: npm install
    startCommand: "mkdir -p /data/data /data/uploads && rm -rf data public/uploads && ln -sfn /data/data data && ln -sfn /data/uploads public/uploads && node src/server.js"
    disk:
      name: blitzkrieg-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: CORS_ORIGIN
        value: "https://blitzkrieg-chess.netlify.app" # The user should update this to their Netlify URL
